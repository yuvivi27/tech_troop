<!DOCTYPE html>
<html>
<head>
  <title>Tom Yam Soup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Tom Yam Soup</h1>

  <img src="https://friedchillies.com/fc/wp-content/uploads/2021/05/Tom_Yam_-_main.jpg" alt="Tom Yam Soup">

  <div class="recipe-box">
    <h2>Ingredients</h2>
    <ul>
      <li>Shrimp</li>
      <li>Mushrooms</li>
      <li>Lemongrass</li>
      <li>Galangal</li>
      <li>Chili paste</li>
      <li>Lime juice</li>
    </ul>

    <h2>Steps</h2>
    <ol>
      <li>Boil water with lemongrass and galangal.</li>
      <li>Add mushrooms and chili paste.</li>
      <li>Add shrimp and cook until pink.</li>
      <li>Stir in lime juice.</li>
      <li>Serve hot.</li>
    </ol>

    <p><a href="https://en.wikipedia.org/wiki/Tom_yum" target="_blank">Tom Yam History</a></p>
  </div>

</body>
</html>
