<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="e8_5.css">
  <title>Document</title>
</head>
<body>
  <form action="/submit-form" method="POST">
  
  <fieldset>
    <legend>Personal Information</legend>
    <label for="fullName">Full Name:</label>
    <input type="text" id="fullName" name="fullName" placeholder="e.g., Jane Doe" required>
    <br><br>
    <label for="emailAddress">Email Address:</label>
    <input type="email" id="emailAddress" name="emailAddress" placeholder="jane@example.com" required>
    <br><br>
    <label for="phoneNumber">Phone Number:</label>
    <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="+972 50-123-4567">
  </fieldset>
  <br>
  <fieldset>
    <legend>Inquiry Details</legend>
    <label for="inquiryType">Reason for Contacting:</label>
    <select id="inquiryType" name="inquiryType" required>
      <option value="">Select a reason...</option>
      <option value="job">Job Opportunity</option>
      <option value="freelance">Freelance Project</option>
      <option value="networking">Networking</option>
      <option value="other">Other</option>
    </select>
    <br><br>

    <p>Preferred Contact Method:</p>
    
    <input type="radio" id="contactEmail" name="contactMethod" value="email" required>
    <label for="contactEmail">Email</label>
    
    <input type="radio" id="contactPhone" name="contactMethod" value="phone">
    <label for="contactPhone">Phone</label>
  </fieldset>
  <br>

  <fieldset>
    <legend>Your Message</legend>
    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="5" cols="40" placeholder="Write your message here..." required></textarea>
    <br><br>

    <input type="checkbox" id="sendCopy" name="sendCopy" value="yes">
    <label for="sendCopy">Send a copy of this message to my email</label>
  </fieldset>
  <br>

  <input type="submit" value="Send Message">
  <input type="reset" value="Clear Form">

</form>
</body>
</html>
