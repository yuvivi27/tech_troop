<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <link rel="stylesheet" href="e5.css">
</head>
<body>

  <div class="card">
    <div class="image-area">
      <div class="icon-circle">
        <span>📷</span>
      </div>
    </div>
    
    <div class="content-area">
      <h2>Premium Laptop</h2>
      <p>High-performance laptop perfect for developers and designers. Features the latest processor, ample RAM, and a stunning display that brings your work to life.</p>
      
      <div class="bottom-row">
        <span class="price">$1,299</span>
        <button class="add-btn">Add to Cart</button>
      </div>
    </div>
  </div>

</body>
</html>
