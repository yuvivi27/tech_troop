<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <link rel="stylesheet" href="layouts-e3.css">
</head>
<body>

  <div class="form-container">
    
    <div class="form-header">
      <h2>Contact Form</h2>
      <p>Get in touch with us</p>
    </div>

    <form>
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName">
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject">
            <option>Select a topic</option>
          </select>
        </div>
        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority">
            <option>Low</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="3" placeholder="Tell us how we can help..."></textarea>
      </div>

      <div class="form-group">
        <label class="section-label">Contact Preferences</label>
        <div class="checkbox-row">
          <label class="checkbox-label"><input type="checkbox"> Email Updates</label>
          <label class="checkbox-label"><input type="checkbox"> Phone Follow-up</label>
          <label class="checkbox-label"><input type="checkbox"> Newsletter</label>
        </div>
      </div>

      <div class="button-row">
        <button type="button" class="btn-secondary">Save Draft</button>
        <button type="submit" class="btn-primary">Send Message</button>
      </div>
    </form>

  </div>

</body>
</html>
